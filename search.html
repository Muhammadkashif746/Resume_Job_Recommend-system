<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Jobs - ResumeAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='search.css') }}">
</head>
<body>

<nav>
     
    <div class="logo">
        <span>Resume<span class="ai">AI</span></span>
    </div>
     
    <div class="nav-links" id="navLinks">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('search') }}">Search Jobs</a>
        <a href="{{ url_for('upload_resume') }}">Upload Resume</a>
    </div>
     

    <a href="{{ url_for('upload_resume') }}" class="btn btn-get-started">Get Started</a>
    

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<div class="container">
    <h1>Discover Opportunities</h1>
    
    <form method="POST" class="search-form">
        <input type="text" name="skill" placeholder="e.g. Python, React, Machine Learning, SQL" required>
        <button type="submit">Search Jobs</button>
    </form>

    <div class="cards">
        {% for job in jobs %}
        <div class="card">
            <h2>{{job.job_title}}</h2>
            <h3>{{job.company}}</h3>
            <p>{{job.location}}</p>
            <div class="match-score">92% Match</div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
    });
</script>
</body>
</html>
